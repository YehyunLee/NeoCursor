<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" fill="#0a0a0b" />
  
  <g transform="translate(512, 512)">
    <!-- Focus Ring -->
    <circle cx="0" cy="0" r="400" stroke="url(#brand-gradient)" stroke-width="20" stroke-dasharray="1200 400" opacity="0.3" />
    
    <!-- Inner Iris -->
    <circle cx="0" cy="0" r="280" stroke="url(#brand-gradient)" stroke-width="40" filter="url(#iconGlow)" />
    
    <!-- Cursor Point -->
    <path d="M0 -140 L45 80 L0 30 L-45 80 Z" fill="url(#brand-gradient)" filter="url(#iconGlow)" transform="scale(1.2)" />
    
    <!-- Tracking accents -->
    <circle cx="280" cy="-280" r="35" fill="#22c55e" opacity="0.6" />
    <circle cx="350" cy="100" r="25" fill="#22c55e" opacity="0.3" />
  </g>
</svg>
